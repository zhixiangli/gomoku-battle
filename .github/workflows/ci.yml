name: CI

on:
  push:
    branches:
      - master
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install pytest numpy
          python -m pip install torch==2.12.0+cpu --index-url https://download.pytorch.org/whl/cpu
          python -m pip install --no-build-isolation --no-deps -e ./alphazero-board-games

      - name: Run Maven tests
        run: mvn --batch-mode test

      - name: Run Python tests
        run: python -m pytest --ignore=alphazero-board-games
